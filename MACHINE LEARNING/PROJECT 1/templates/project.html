<!DOCTYPE html>

<html>

<head>

<title>Laptop Price Prediction</title>


<style>


body{

font-family:Arial;
background:#eef2f3;

}


.container{

width:70%;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;

}



select,button{

width:100%;
padding:10px;
margin:8px;

}



button{

background:#2e3a59;
color:white;
border:none;
cursor:pointer;

}



.result{

margin-top:25px;
padding:20px;
background:#eaffea;
border-radius:10px;
text-align:center;

}


</style>


</head>


<body>



<div class="container">


<h1 align="center">
Laptop Price Prediction
</h1>




<form action="/predict" method="POST">



<label>Brand</label>

<select name="brand">

{% for x in brand_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>



<label>Processor</label>

<select name="processor">

{% for x in processor_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<label>CPU</label>

<select name="cpu">

{% for x in cpu_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<label>RAM</label>

<select name="ram">

{% for x in ram_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<label>RAM Type</label>

<select name="ram_type">

{% for x in ram_type_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<label>ROM</label>

<select name="rom">

{% for x in rom_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<label>ROM Type</label>

<select name="rom_type">

{% for x in rom_type_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<label>GPU</label>

<select name="gpu">

{% for x in gpu_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<label>Display Size</label>

<select name="display_size">

{% for x in display_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<label>OS</label>

<select name="os">

{% for x in os_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<label>Warranty</label>

<select name="warranty">

{% for x in warranty_list %}

<option value="{{x}}">
{{x}}
</option>

{% endfor %}

</select>




<button>

Predict Price

</button>



</form>






{% if prediction %}


<div class="result">


<h2>
Predicted Laptop Price
</h2>


<h1>
₹ {{prediction}}
</h1>


</div>


{% endif %}





</div>



</body>

</html>
