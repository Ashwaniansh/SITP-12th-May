<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>

<style>

body{
    font-family:sans-serif;
    margin:0;
    padding:0;
}

header{
    background-color:#f0f0f0;
    padding:20px;
    text-align:center;
}

main{
    padding:20px;
    width:50%;
    margin:0 auto;
}

.form-container{
    border:1px solid #ddd;
    padding:20px;
    border-radius:5px;
}

.form-container input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

.form-container button{
    background-color:#4CAF50;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.form-container button:hover{
    background-color:#3e8e41;
}

.Prediction{
    width:100vw;
    display:flex;
    justify-content:center;
}
</style>

</head>
<body>

<header>
    <h1>Loan Approval Prediction</h1>
</header>

<main>

<section class="description">
    <h2>Welcome to Loan Approval Prediction Tool</h2>
    <p>Enter applicant details to predict loan approval status.</p>
</section>

<section class="form-container">

<form action="{{ url_for('predict') }}" method="post">

    <label>Income</label>
    <input type="number" name="income" required>

    <label>Credit Score</label>
    <input type="number" name="credit_score" required>

    <label>Loan Amount</label>
    <input type="number" name="loan_amount" required>

    <label>Years Employed</label>
    <input type="number" name="years_employed" required>

    <button type="submit">
        Predict Loan Status
    </button>

</form>

</section>

</main>

<div class="Prediction">
    <h2>{{ prediction }}</h2>
</div>

</body>
</html>
